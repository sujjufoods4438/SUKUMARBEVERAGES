<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const logoWrap = document.getElementById('logo-wrap');
const logoImg  = document.getElementById('logo-img');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- FOAM PARTICLES ----
const foam = [];
function addFoam(x, y) {
  for (let i = 0; i < 8; i++) {
    foam.push({
      x, y,
      vx: (Math.random()-0.5)*3,
      vy: -(1 + Math.random()*3),
      r: 1.5 + Math.random()*3.5,
      life: 1,
      decay: 0.008 + Math.random()*0.014
    });
  }
}

// ---- BUBBLE PARTICLES (underwater) ----
const bubbles = [];
function addBubble() {
  bubbles.push({
    x: W*0.3 + Math.random()*W*0.4,
    y: H + 20,
    r: 2 + Math.random()*6,
    speed: 0.5 + Math.random()*1.5,
    wobble: Math.random()*0.05,
    wobbleOff: Math.random()*Math.PI*2,
    life: 1
  });
}

let logoBottomPx = -400;

function draw(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 1000;

  ctx.clearRect(0, 0, W, H);

  // === DEEP NIGHT OCEAN BACKGROUND ===
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,    '#00070f');
  bg.addColorStop(0.25, '#000d1a');
  bg.addColorStop(0.55, '#001428');
  bg.addColorStop(0.75, '#001e3d');
  bg.addColorStop(1,    '#002a55');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.save();
  ctx.globalAlpha = 0.6;
  for (let s = 0; s < 120; s++) {
    // deterministic pseudo-random from index
    const sx = ((s * 137.508 + 50) % W);
    const sy = ((s * 97.3 + 20) % (H * 0.45));
    const sr = 0.5 + (s % 3) * 0.4;
    const flicker = 0.5 + 0.5 * Math.sin(t * 0.03 + s);
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,220,255,${flicker})`;
    ctx.fill();
  }
  ctx.restore();

  // Moon
  const moonX = W * 0.75, moonY = H * 0.09;
  const moonG = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 55);
  moonG.addColorStop(0,   'rgba(240,245,255,0.95)');
  moonG.addColorStop(0.4, 'rgba(200,225,255,0.6)');
  moonG.addColorStop(0.8, 'rgba(150,200,255,0.15)');
  moonG.addColorStop(1,   'transparent');
  ctx.fillStyle = moonG;
  ctx.beginPath();
  ctx.arc(moonX, moonY, 55, 0, Math.PI*2);
  ctx.fill();

  // Moon path shimmer on water
  ctx.save();
  ctx.globalAlpha = 0.07;
  const shim = ctx.createLinearGradient(W*0.55, H*0.3, W*0.78, H);
  shim.addColorStop(0, 'rgba(200,230,255,0)');
  shim.addColorStop(0.4,'rgba(200,230,255,1)');
  shim.addColorStop(1, 'rgba(200,230,255,0.3)');
  ctx.fillStyle = shim;
  ctx.beginPath();
  ctx.moveTo(W*0.62, H*0.25);
  ctx.lineTo(W*0.88, H);
  ctx.lineTo(W*0.62, H);
  ctx.lineTo(W*0.50, H*0.25);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // === UNDERWATER BUBBLES (before logo appears) ===
  if (elapsed > 3 && elapsed < 13 && Math.random() < 0.3) addBubble();
  for (let i = bubbles.length-1; i>=0; i--) {
    const b = bubbles[i];
    b.y -= b.speed;
    b.x += Math.sin(t * b.wobble + b.wobbleOff) * 0.8;
    b.life -= 0.003;
    if (b.y < H*0.4 || b.life <= 0) { bubbles.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(100,200,255,${b.life * 0.5})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // === UNDERWATER GLOW (rises before logo) ===
  if (elapsed > 4) {
    const gp = Math.min(1, (elapsed - 4) / 5);
    const ease = 1 - Math.pow(1-gp, 2);
    const gy = H * (0.9 - ease * 0.35);
    const ug = ctx.createRadialGradient(W*0.5, gy, 0, W*0.5, gy, W*0.32);
    ug.addColorStop(0,   `rgba(0,160,255,${0.22 * ease})`);
    ug.addColorStop(0.35,`rgba(0,90,200,${0.12 * ease})`);
    ug.addColorStop(0.7, `rgba(0,50,150,${0.06 * ease})`);
    ug.addColorStop(1,   'transparent');
    ctx.fillStyle = ug;
    ctx.fillRect(0, 0, W, H);
  }

  // === DRAW WAVE LAYERS (back → front) ===
  waves.forEach((wave, wi) => {
    const phase = wave.ph + t * wave.spd;
    const amp   = wave.A * H;
    const base  = wave.base * H;

    ctx.beginPath();
    ctx.moveTo(0, H);

    let prevY = base;
    let crests = [];

    for (let x = 0; x <= W; x += 3) {
      const y = base
        + Math.sin(x * wave.f + phase) * amp
        + Math.sin(x * wave.f*1.7 + phase*1.3) * amp * 0.38
        + Math.sin(x * wave.f*0.55 + phase*0.6) * amp * 0.22
        + Math.sin(x * wave.f*2.8 + phase*2.1) * amp * 0.1;

      if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);

      if (x > 6 && y > prevY && prevY < base - amp*0.45) {
        crests.push({x: x-3, y: prevY});
      }
      prevY = y;
    }

    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();

    // Rich deep-blue wave gradient
    const wg = ctx.createLinearGradient(0, base - amp*1.5, 0, H);
    wg.addColorStop(0,    `rgba(${wave.r+90},${wave.g+50},${wave.b+40},${wave.a})`);
    wg.addColorStop(0.08, `rgba(${wave.r+50},${wave.g+25},${wave.b+15},${wave.a})`);
    wg.addColorStop(0.3,  `rgba(${wave.r},${wave.g},${wave.b},${wave.a})`);
    wg.addColorStop(0.7,  `rgba(${Math.max(wave.r-5,0)},${Math.max(wave.g-15,0)},${Math.max(wave.b-25,0)},${wave.a})`);
    wg.addColorStop(1,    `rgba(0,10,40,${wave.a})`);
    ctx.fillStyle = wg;
    ctx.fill();

    // Foam crest line
    if (wi <= 4) {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 3) {
        const y = base
          + Math.sin(x*wave.f+phase)*amp
          + Math.sin(x*wave.f*1.7+phase*1.3)*amp*0.38
          + Math.sin(x*wave.f*0.55+phase*0.6)*amp*0.22;
        if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      const crestAlpha = [0.7,0.55,0.42,0.30,0.18][wi];
      ctx.strokeStyle = `rgba(210,240,255,${crestAlpha})`;
      ctx.lineWidth = wi===0 ? 4 : wi<=2 ? 2.5 : 1.5;
      ctx.stroke();

      // Spawn foam at crests
      if (wi <= 1 && Math.random() < 0.12) {
        crests.slice(0, 3).forEach(c => addFoam(c.x, c.y));
      }
    }
  });

  // === FOAM PARTICLES ===
  for (let i = foam.length-1; i>=0; i--) {
    const p = foam[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.06;
    p.life -= p.decay;
    if (p.life <= 0) { foam.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = `rgba(230,245,255,${p.life * 0.75})`;
    ctx.fill();
  }

  // === LOGO RISES FROM UNDERGROUND ===
  if (elapsed > 8) {
    const rp = Math.min(1, (elapsed - 8) / 5.5);
    // Ease out expo
    const ease = rp === 1 ? 1 : 1 - Math.pow(2, -10 * rp);

    const targetBottom = H * 0.28;
    logoBottomPx = -400 + (targetBottom + 400) * ease;
    logoOpacity  = Math.min(1, rp * 1.8);

    logoWrap.style.bottom  = logoBottomPx + 'px';
    logoWrap.style.opacity = logoOpacity;

    // Dynamic glow as it rises
    const glow1 = 25 + ease * 55;
    const glow2 = glow1 * 2;
    const ga    = 0.5 + ease * 0.45;
    logoImg.style.filter =
      `drop-shadow(0 0 ${glow1}px rgba(0,190,255,${ga})) ` +
      `drop-shadow(0 0 ${glow2}px rgba(0,100,220,${ga*0.5})) ` +
      `drop-shadow(0 0 4px rgba(255,255,255,0.3))`;

    // Water ripple under logo
    if (rp > 0.3) {
      const rp2 = (rp - 0.3) / 0.7;
      const ry = H - logoBottomPx - 160;
      ctx.save();
      for (let ri = 0; ri < 3; ri++) {
        const rRad = (80 + ri*60) * rp2;
        const rAlpha = (0.25 - ri*0.07) * (1 - rp2*0.5) * logoOpacity;
        ctx.beginPath();
        ctx.ellipse(W*0.5, ry + H*0.02, rRad, rRad*0.22, 0, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(100,200,255,${rAlpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  t += 0.45;
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
